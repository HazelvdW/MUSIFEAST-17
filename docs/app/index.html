<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive MUSIFEAST-17 Player</title>

  <!-- Local shinylive bundle from shinylive::export() -->
  <script src="./shinylive/load-shinylive-sw.js" type="module"></script>
  <script src="./shinylive/shinylive.js" type="module"></script>
  <link rel="stylesheet" href="./shinylive/shinylive.css">
  <link rel="stylesheet" href="./bootstrap.min.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d0d; color: #fff; }

    /* Loading overlay — stays visible until we explicitly hide it */
    #loading-screen {
      position: fixed; inset: 0; background: #0d0d0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.4rem; z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #loading-screen.fade-out {
      opacity: 0; pointer-events: none;
    }

    .ls-title {
      font-family: sans-serif; font-size: 1.1rem; font-weight: 700;
      color: #39ff14; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .ls-sub {
      font-family: sans-serif; font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      max-width: 300px; text-align: center; line-height: 1.6;
    }
    .ls-bar-wrap {
      width: 260px; height: 3px;
      background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
    }
    .ls-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #39ff14, #00cfff);
      border-radius: 2px;
      animation: bar-grow 70s ease-out forwards;
    }
    @keyframes bar-grow {
      0%  { width:  0%; }
      10% { width:  8%; }
      30% { width: 25%; }
      55% { width: 50%; }
      75% { width: 68%; }
      90% { width: 82%; }
      99% { width: 93%; }
    }

    /* App container — hidden until app is ready */
    #app-wrap {
      width: 100%; height: 100vh;
      visibility: hidden;  /* hidden not opacity:0 so it can't receive events */
    }
    #app-wrap.ready {
      visibility: visible;
    }

    shinylive-app {
      display: block; width: 100%; height: 100vh;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="ls-title">MUSIFEAST-17</div>
    <div class="ls-sub">
      Starting the R environment in your browser.<br>
      This takes 30–90 seconds on first visit.
    </div>
    <div class="ls-bar-wrap"><div class="ls-bar"></div></div>
    <div class="ls-sub" style="font-size:0.73rem; opacity:0.4; margin-top:-0.5rem;">
      shinylive + webR · no server required
    </div>
  </div>

  <div id="app-wrap">
    <shinylive-app
      engine="r"
      code-url="./app.json"
      style="height:100vh;"
    ></shinylive-app>
  </div>

  <script type="module">
    const loadingEl = document.getElementById('loading-screen');
    const appWrap   = document.getElementById('app-wrap');
    let revealed    = false;

    function reveal() {
      if (revealed) return;
      revealed = true;
      // Show the app
      appWrap.classList.add('ready');
      // Fade out loading screen after a beat
      setTimeout(() => {
        loadingEl.classList.add('fade-out');
        // Remove from DOM after transition so it can't block clicks
        setTimeout(() => loadingEl.remove(), 900);
      }, 600);
    }

    // Strategy: poll the DOM for shinylive having rendered content
    // This is more reliable than event-based approaches in shinylive 0.x
    function pollForApp() {
      const shadow = document.querySelector('shinylive-app');
      if (!shadow) { setTimeout(pollForApp, 500); return; }

      // Look for Shiny's iframe or any rendered content inside the component
      const checkReady = setInterval(() => {
        // shinylive renders an iframe once the R session is running
        const iframe = shadow.shadowRoot
          ? shadow.shadowRoot.querySelector('iframe')
          : shadow.querySelector('iframe');

        // Also check for direct child divs (some shinylive versions don't use iframe)
        const hasDivContent = shadow.shadowRoot
          ? shadow.shadowRoot.querySelector('.shinylive-wrapper, .shiny-frame, [class*="shiny"]')
          : shadow.querySelector('.shinylive-wrapper, .shiny-frame, [class*="shiny"]');

        if (iframe || hasDivContent) {
          clearInterval(checkReady);
          // Give Shiny another 2 seconds to actually render UI before revealing
          setTimeout(reveal, 2000);
        }
      }, 800);

      // Hard cap: reveal after 150s regardless (covers very slow connections)
      setTimeout(() => {
        clearInterval(checkReady);
        reveal();
      }, 150000);
    }

    // Start polling once the module scripts have had a moment to initialise
    setTimeout(pollForApp, 1500);
  </script>

</body>
</html>
